version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: race_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: race
      POSTGRES_PASSWORD: race
      POSTGRES_DB: race_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/race-app/data
    networks:
      - race-network

  adminer:
    image: adminer
    container_name: race_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - race-network

  api:
    build: .
    container_name: race_api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://race_postgres:5432/race_db
      DATABASE_USER: race
      DATABASE_PASSWORD: race
    depends_on:
      - postgres
    networks:
      - race-network

volumes:
  postgres_data:

networks:
  race-network: